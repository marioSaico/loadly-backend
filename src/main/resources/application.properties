spring.application.name=backend
server.port=8080

# ============================================
# CONFIGURACIÓN MÚLTIPLES DATASOURCES - MySQL
# ============================================

# Base de Datos Primaria
spring.datasource.primary.url=jdbc:mysql://127.0.0.1:3306/mydb?useSSL=false&serverTimezone=UTC
spring.datasource.primary.username=root
spring.datasource.primary.password=12345
spring.datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver

# Base de Datos Secundaria
spring.datasource.secondary.url=jdbc:mysql://127.0.0.1:3306/mydb?useSSL=false&serverTimezone=UTC
spring.datasource.secondary.username=root
spring.datasource.secondary.password=12345
spring.datasource.secondary.driver-class-name=com.mysql.cj.jdbc.Driver

# Base de Datos Terciaria (Opcional)
spring.datasource.tertiary.url=jdbc:mysql://127.0.0.1:3306/mydb?useSSL=false&serverTimezone=UTC
spring.datasource.tertiary.username=root
spring.datasource.tertiary.password=12345
spring.datasource.tertiary.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# POOL DE CONEXIONES (HikariCP)
# ============================================
spring.datasource.primary.hikari.maximum-pool-size=10
spring.datasource.primary.hikari.minimum-idle=5
spring.datasource.primary.hikari.connection-timeout=20000

spring.datasource.secondary.hikari.maximum-pool-size=10
spring.datasource.secondary.hikari.minimum-idle=5
spring.datasource.secondary.hikari.connection-timeout=20000

spring.datasource.tertiary.hikari.maximum-pool-size=10
spring.datasource.tertiary.hikari.minimum-idle=5
spring.datasource.tertiary.hikari.connection-timeout=20000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ============================================
# CONFIGURACIÓN MULTIPART/FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-http-post-size=104857600